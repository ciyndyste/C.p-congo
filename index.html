<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congo Pétrole | Inscription Officielle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --gold: #f59e0b; 
            --dark-oil: #020617; 
            --gree-gray: #f2f2f2;
        }
        
        body { 
            margin: 0; padding: 0;
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh;
            background: url('IMG_4394.jpeg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: black;
            overflow: hidden;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: 1;
        }

        .oil-card { 
            position: relative; z-index: 10;
            background: #ffffff;
            border-radius: 20px;
            padding: 40px 20px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 { 
            color: var(--gold);
            font-size: 1.8rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .input-modern { 
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            background-color: var(--gree-gray);
            color: #333;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .input-modern:focus { 
            border-color: var(--gold);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        .phone-container {
            display: flex;
            align-items: center;
            background-color: var(--gree-gray);
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        
        .phone-prefix {
            padding: 18px 0 18px 18px;
            font-size: 1rem;
            color: #333;
            font-weight: 500;
        }
        
        .phone-container input {
            border: none;
            margin-bottom: 0;
            padding-left: 10px;
            width: 100%;
            background: transparent;
            outline: none;
            padding-top: 18px;
            padding-bottom: 18px;
        }
        
        .phone-container:focus-within {
            border-color: var(--gold);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        .btn-gold {
            width: 100%;
            padding: 18px;
            background-color: #000000;
            color: var(--gold);
            border: none;
            border-radius: 30px;
            font-weight: 700;
            transition: 0.3s;
            cursor: pointer;
            margin-top: 10px;
            font-size: 1rem;
        }

        .btn-gold:active { transform: scale(0.97); opacity: 0.8; }

        .btn-outline {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: #ffffff;
            color: #333;
            border: 1px solid #333;
            border-radius: 30px;
            font-weight: 500;
            text-align: center;
            text-decoration: none;
            margin-top: 15px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="oil-card">
        <div class="text-center mb-12">
            <div class="inline-block p-4 rounded-full bg-amber-500/10 ring-1 ring-amber-500/20 mb-3">
                <i class="fa-solid fa-droplet text-4xl text-amber-500 animate-pulse"></i>
            </div>
            <h1>Congo Pétrole</h1>
            <p class="text-[9px] text-gray-500 uppercase tracking-[0.3em]">Investissement Énergétique</p>
        </div>

        <form id="registerForm">
            <div class="phone-container">
                <span class="phone-prefix">+243</span>
                <input type="tel" id="phone" placeholder="Numéro de téléphone" required>
            </div>
            
            <input type="password" id="password" placeholder="Saisir un mot de passe (chiffres)" class="input-modern" required>
            <input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe" class="input-modern" required>
            <input type="text" id="inviteCode" placeholder="Code d'invitation (Numéro Parrain)" class="input-modern" required>

            <button type="submit" id="submitBtn" class="btn-gold">
                Créer un compte
            </button>
        </form>

        <div class="mt-4">
            <a href="login.html" class="btn-outline">
                Déjà un compte ? Se connecter
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Configuration Firebase
        const firebaseConfig = {
            databaseURL: "https://firstsolar-e2ba3-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- DÉTECTION AUTOMATIQUE DU PARRAIN DANS L'URL ---
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');
            if (refCode) {
                // Harmonisation du code (retrait du préfixe CP- si présent)
                document.getElementById('inviteCode').value = refCode.replace('CP-', '').toUpperCase();
            }
        });

        document.getElementById("registerForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            
            // Nettoyage et formatage du numéro (Format international RDC : 243...)
            const phoneInput = document.getElementById('phone').value.trim().replace(/\s/g, '');
            const phone = phoneInput.startsWith('243') ? phoneInput : '243' + phoneInput.replace(/^0/, '');
            
            const password = document.getElementById('password').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();
            
            // Nettoyage du code parrain
            let inviteCode = document.getElementById('inviteCode').value.trim().toUpperCase();
            inviteCode = inviteCode.replace('CP-', '');

            const submitBtn = document.getElementById('submitBtn');

            // Validations de base
            if (password !== confirmPassword) { return alert("Les mots de passe ne correspondent pas."); }
            if (password.length < 6 || !/^\d+$/.test(password)) { return alert("Le mot de passe doit contenir au moins 6 chiffres."); }
            if (phone.length < 12) { return alert("Numéro de téléphone invalide."); }

            submitBtn.disabled = true;
            submitBtn.innerText = "Traitement...";

            try {
                const userRef = ref(db, 'congo_petrole/users/' + phone);
                const snapshot = await get(userRef);

                if (snapshot.exists()) {
                    alert("Ce compte existe déjà avec ce numéro.");
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Créer un compte";
                } else {
                    // --- ENREGISTREMENT DANS LA BASE DE DONNÉES ---
                    await set(userRef, {
                        phone: phone,
                        password: password, 
                        parrain: inviteCode, 
                        balance: 0,
                        totalInvested: 0, // Indispensable pour l'affichage réseau
                        vipActive: 0,
                        lastHarvest: Date.now(),
                        dateJoined: new Date().toLocaleString(),
                        // Génération du code personnel (6 derniers chiffres du tel)
                        myInviteCode: phone.substring(phone.length - 6).toUpperCase() 
                    });
                    
                    alert("Compte créé avec succès ! Bienvenue chez Congo Pétrole.");
                    window.location.href = "login.html";
                }
            } catch (error) {
                console.error(error);
                alert("Erreur réseau. Vérifiez votre connexion.");
                submitBtn.disabled = false;
                submitBtn.innerText = "Créer un compte";
            }
        });
    </script>
</body>
</html>
