<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congo Pétrole | Inscription Officielle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --gold: #f59e0b; 
            --dark-oil: #020617; 
            --gree-gray: #f2f2f2; /* La couleur de fond des inputs sur l'image */
        }
        
        /* Centralisation absolue et fond image (votre fond pétrole) */
        body { 
            margin: 0; padding: 0;
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh;
            background: url('IMG_4394.jpeg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; /* Police plus proche de l'image */
            color: black; /* Le texte de la carte est sombre */
            overflow: hidden;
        }

        /* Superposition sombre sur l'image de fond pour le contraste */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: 1;
        }

        /* Carte Blanche (Design GREE) */
        .oil-card { 
            position: relative; z-index: 10;
            background: #ffffff; /* Fond blanc pur comme sur l'image */
            border-radius: 20px; /* Arrondis plus doux comme l'image */
            padding: 40px 20px;
            width: 90%;
            max-width: 380px; /* Taille compacte */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        /* Titre Congo Pétrole (on garde votre style mais plus petit) */
        h1 { 
            color: var(--gold);
            font-size: 1.8rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        /* Style des Champs de Saisie (Exactement comme GREE) */
        .input-modern { 
            width: 100%;
            padding: 18px; /* Plus grand pour l'ergonomie */
            border-radius: 12px;
            border: 1px solid #e0e0e0; /* Bordure fine grise */
            background-color: var(--gree-gray); /* Fond gris très clair */
            color: #333;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
            font-size: 1rem;
            margin-bottom: 15px; /* Espace entre les champs */
        }

        /* Focus doré pour l'identité Congo Pétrole */
        .input-modern:focus { 
            border-color: var(--gold);
            background-color: #ffffff; /* Devient blanc au focus */
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        .input-modern::placeholder { color: #aaaaaa; font-weight: 400; }

        /* Conteneur spécial pour le téléphone avec le préfixe fixe */
        .phone-container {
            display: flex;
            align-items: center;
            background-color: var(--gree-gray);
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        
        .phone-prefix {
            padding: 18px 0 18px 18px;
            font-size: 1rem;
            color: #333;
            font-weight: 500;
        }
        
        .phone-container input {
            border: none;
            margin-bottom: 0;
            padding-left: 10px;
        }
        
        .phone-container:focus-within {
            border-color: var(--gold);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }
        .phone-container:focus-within input {
            background-color: #ffffff;
        }

        /* Bouton Principal Noir (Design GREE, couleur or Congo) */
        .btn-gold {
            width: 100%;
            padding: 18px;
            background-color: #000000; /* Bouton Noir comme sur l'image */
            color: var(--gold); /* Texte Doré pour l'identité */
            border: none;
            border-radius: 30px; /* Très arrondi comme GREE */
            font-weight: 700;
            text-transform: none; /* Pas de majuscules automatiques */
            letter-spacing: normal;
            transition: 0.3s;
            cursor: pointer;
            margin-top: 10px;
            font-size: 1rem;
        }

        .btn-gold:active { transform: scale(0.97); opacity: 0.8; }
        .btn-gold:disabled { background-color: #555; color: #aaa; cursor: not-allowed; }

        /* Bouton Secondaire "Se connecter" (Design GREE) */
        .btn-outline {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: #ffffff;
            color: #333;
            border: 1px solid #333; /* Bordure noire fine */
            border-radius: 30px;
            font-weight: 500;
            text-align: center;
            text-decoration: none;
            margin-top: 15px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.3s;
        }
        
        .btn-outline:active { background-color: #f0f0f0; }

    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="oil-card">
        <div class="text-center mb-12">
            <div class="inline-block p-4 rounded-full bg-amber-500/10 ring-1 ring-amber-500/20 mb-3">
                <i class="fa-solid fa-droplet text-4xl text-amber-500 animate-pulse"></i>
            </div>
            <h1>Congo Pétrole</h1>
            <p class="text-[9px] text-gray-500 uppercase tracking-[0.3em]">Investissement Énergétique</p>
        </div>

        <form id="registerForm">
            <div class="phone-container">
                <span class="phone-prefix">+243</span>
                <input type="tel" id="phone" placeholder="Numéro de téléphone portable" required>
            </div>
            
            <input type="password" id="password" placeholder="Veuillez saisir votre mot de passe" class="input-modern" required>
            <input type="password" id="confirmPassword" placeholder="Répéter le mot de passe" class="input-modern" required>
            <input type="text" id="inviteCode" placeholder="Code d'invitation Parrain" class="input-modern" required>

            <button type="submit" id="submitBtn" class="btn-gold">
                Créer un compte
            </button>
        </form>

        <div class="mt-4">
            <a href="login.html" class="btn-outline">
                J'ai déjà un compte, connectez-vous
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://firstsolar-e2ba3-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- DÉTECTION AUTOMATIQUE DU CODE PARRAIN DANS L'URL ---
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');
            if (refCode) {
                document.getElementById('inviteCode').value = refCode;
            }
        });

        document.getElementById("registerForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            
            // Récupération et nettoyage du numéro (on enlève les espaces s'il y en a)
            const phoneInput = document.getElementById('phone').value.trim().replace(/\s/g, '');
            // On s'assure que le numéro commence par 243 pour Firebase
            const phone = phoneInput.startsWith('243') ? phoneInput : '243' + phoneInput.replace(/^0/, '');
            
            const password = document.getElementById('password').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();
            const inviteCode = document.getElementById('inviteCode').value.trim();
            const submitBtn = document.getElementById('submitBtn');

            // --- VALIDATIONS ---
            if (password !== confirmPassword) {
                return alert("Les deux mots de passe ne correspondent pas.");
            }

            if (password.length < 6 || !/^\d+$/.test(password)) {
                return alert("Le mot de passe doit contenir au moins 6 chiffres.");
            }

            // Simple validation du numéro congolais (min 9 chiffres après 243)
            if (phone.length < 12) {
                return alert("Veuillez saisir un numéro de téléphone valide.");
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "Création en cours...";

            try {
                const userRef = ref(db, 'congo_petrole/users/' + phone);
                const snapshot = await get(userRef);

                if (snapshot.exists()) {
                    alert("Ce compte existe déjà. Connectez-vous.");
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Créer un compte";
                } else {
                    // Création de l'utilisateur dans la branche congo_petrole
                    await set(userRef, {
                        phone: phone,
                        password: password, 
                        referralBy: inviteCode,
                        balance: 0,
                        lastHarvest: Date.now(),
                        dateJoined: new Date().toLocaleString(),
                        myInviteCode: "PETROL" + phone.slice(-4)
                    });
                    
                    alert("Compte Congo Pétrole créé avec succès ! Veuillez vous connecter.");
                    window.location.href = "login.html";
                }
            } catch (error) {
                console.error(error);
                alert("Erreur réseau. Veuillez réessayer.");
                submitBtn.disabled = false;
                submitBtn.innerText = "Créer un compte";
            }
        });
    </script>
</body>
</html>
