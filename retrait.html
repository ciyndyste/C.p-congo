<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congo Pétrole | Retrait</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --gold: #f59e0b; --oil-black: #020617; }
        body { background: var(--oil-black); font-family: 'Inter', sans-serif; color: white; }
        
        .card-glass { 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 24px;
        }
        
        .btn-retrait { 
            background: linear-gradient(135deg, #f59e0b, #d97706); 
            color: black; 
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.2);
        }
        .btn-disabled { background: #1e293b !important; color: #475569 !important; cursor: not-allowed; opacity: 0.5; box-shadow: none; }
        
        .status-badge { font-size: 9px; padding: 4px 12px; border-radius: 20px; font-weight: 900; letter-spacing: 0.1em; }
        
        input, select { 
            background: rgba(15, 23, 42, 0.8) !important; 
            color: white !important; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
        }
        input:focus { border-color: var(--gold) !important; outline: none; }
    </style>
</head>
<body class="pb-20">

    <div class="bg-slate-900/50 backdrop-blur-md p-5 flex items-center border-b border-white/5 sticky top-0 z-50">
        <a href="compte.html" class="text-amber-500 mr-4 active:scale-90 transition-transform">
            <i class="fa-solid fa-chevron-left text-xl"></i>
        </a>
        <h1 class="text-sm font-black uppercase tracking-widest text-white">Extraction des Revenus</h1>
    </div>

    <div class="p-5">
        <div id="vipCheckBar" class="card-glass p-5 mb-4 flex justify-between items-center border-l-4 border-amber-500">
            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Statut Forage :</span>
            <span id="vipStatusBadge" class="status-badge bg-slate-800 text-slate-500 uppercase italic">Analyse...</span>
        </div>

        <div class="card-glass p-6 mb-6">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <p class="text-[9px] font-black text-amber-500 uppercase tracking-widest mb-1">Disponible pour retrait</p>
                    <h2 id="currentBalanceDisplay" class="text-3xl font-black italic">FC 0</h2>
                </div>
                <div class="w-10 h-10 bg-amber-500/10 rounded-full flex items-center justify-center border border-amber-500/20">
                    <i class="fa-solid fa-wallet text-amber-500"></i>
                </div>
            </div>
            
            <div class="space-y-3 border-t border-white/5 pt-4">
                <div class="flex items-center text-[10px] font-bold text-slate-400">
                    <i class="fa-solid fa-clock w-5 text-amber-500"></i>
                    <span>Horaires : 09:00 — 17:00 (RDC)</span>
                </div>
                <div class="flex items-center text-[10px] font-bold text-slate-400">
                    <i class="fa-solid fa-circle-minus w-5 text-amber-500"></i>
                    <span>Minimum : 4.200 FC</span>
                </div>
                <div class="flex items-center text-[10px] font-bold text-slate-400">
                    <i class="fa-solid fa-percent w-5 text-amber-500"></i>
                    <span>Frais d'entretien : 12%</span>
                </div>
            </div>
        </div>

        <div id="formContainer" class="card-glass p-6">
            <form id="withdrawalForm" class="space-y-6">
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-500 ml-1 tracking-widest">Montant à extraire (FC)</label>
                    <input type="number" id="amount" placeholder="Min. 4200" 
                           class="w-full p-4 rounded-2xl text-xl font-black italic mt-1" 
                           min="4200" required>
                </div>

                <div class="bg-black/30 p-4 rounded-2xl border border-white/5">
                    <div class="flex justify-between text-[10px] font-bold text-slate-500 mb-1">
                        <span>Frais de service (12%) :</span>
                        <span id="feesDisplay">0 FC</span>
                    </div>
                    <div class="flex justify-between text-xs font-black text-white border-t border-white/5 pt-2">
                        <span class="uppercase tracking-tighter">Net à recevoir :</span>
                        <span id="netAmount" class="text-amber-500 italic">0 FC</span>
                    </div>
                </div>

                <div>
                    <label class="text-[9px] font-black uppercase text-slate-500 ml-1 tracking-widest">Opérateur de réception</label>
                    <select id="network" class="w-full p-4 rounded-2xl text-sm font-bold mt-1" required>
                        <option value="">Sélectionner...</option>
                        <option value="Orange">Orange Money</option>
                        <option value="Airtel">Airtel Money</option>
                        <option value="Vodacom">M-Pesa (Vodacom)</option>
                    </select>
                </div>

                <div>
                    <label class="text-[9px] font-black uppercase text-slate-500 ml-1 tracking-widest">Numéro du bénéficiaire</label>
                    <input type="tel" id="userPhoneInput" placeholder="Ex: 08..." 
                           class="w-full p-4 rounded-2xl text-sm font-bold mt-1" required>
                </div>

                <div id="timeStatus" class="text-center"></div>
                
                <button type="submit" id="submitBtn" class="w-full btn-retrait py-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] transition-all active:scale-95">
                    Lancer l'extraction
                </button>
            </form>
        </div>
    </div>

    <script>
        const DB_URL = "https://firstsolar-e2ba3-default-rtdb.firebaseio.com/congo_petrole";
        const loggedUserPhone = localStorage.getItem('userPhone');
        
        let userCurrentBalance = 0;

        async function initWithdrawal() {
            if (!loggedUserPhone) {
                lockForm("Connexion requise");
                return;
            }

            try {
                const res = await fetch(`${DB_URL}/users/${loggedUserPhone}.json`);
                const user = await res.json();

                if (user) {
                    userCurrentBalance = user.balance || 0;
                    document.getElementById('currentBalanceDisplay').innerText = `FC ${userCurrentBalance.toLocaleString()}`;
                    
                    // Vérification de l'éligibilité (Doit avoir un forage actif)
                    if (user.vipActive) {
                        const badge = document.getElementById('vipStatusBadge');
                        badge.innerText = "ÉLIGIBLE";
                        badge.classList.replace('text-slate-500', 'text-green-500');
                        badge.classList.add('bg-green-500/10');
                        checkTime();
                    } else {
                        lockForm("Forage requis");
                    }
                }
            } catch (e) { console.error("Erreur de chargement"); }
        }

        function lockForm(msg) {
            const form = document.getElementById('withdrawalForm');
            const btn = document.getElementById('submitBtn');
            const badge = document.getElementById('vipStatusBadge');
            
            form.classList.add('opacity-30', 'pointer-events-none');
            btn.classList.add('btn-disabled');
            btn.innerText = msg;
            badge.innerText = "INACTIF";
            badge.classList.replace('text-slate-500', 'text-red-500');
        }

        function checkTime() {
            const hour = new Date().getHours();
            if (hour < 9 || hour >= 17) {
                const btn = document.getElementById('submitBtn');
                btn.classList.add('btn-disabled');
                btn.disabled = true;
                document.getElementById('timeStatus').innerHTML = '<p class="text-red-500 text-[9px] font-black uppercase italic tracking-widest mb-2">Bureau fermé (09h-17h)</p>';
            }
        }

        // Calcul automatique des frais
        document.getElementById('amount').addEventListener('input', function() {
            const val = parseFloat(this.value) || 0;
            const fees = val * 0.12;
            const net = val - fees;
            document.getElementById('feesDisplay').innerText = Math.floor(fees).toLocaleString() + " FC";
            document.getElementById('netAmount').innerText = (net > 0 ? Math.floor(net) : 0).toLocaleString() + " FC";
        });

        document.getElementById('withdrawalForm').onsubmit = async function(e) {
            e.preventDefault();
            const amount = parseFloat(document.getElementById('amount').value);
            const net = amount - (amount * 0.12);
            const network = document.getElementById('network').value;
            const phone = document.getElementById('userPhoneInput').value;

            if (amount < 4200) return alert("Le montant minimum d'extraction est de 4.200 FC.");
            if (amount > userCurrentBalance) return alert("Capital insuffisant dans votre puits !");

            if (confirm(`Confirmer l'extraction de FC ${amount.toLocaleString()} ?\nNet à recevoir : FC ${Math.floor(net).toLocaleString()}`)) {
                try {
                    const btn = document.getElementById('submitBtn');
                    btn.disabled = true;
                    btn.innerText = "Extraction en cours...";

                    // 1. Mise à jour du solde
                    const nouveauSolde = userCurrentBalance - amount;
                    await fetch(`${DB_URL}/users/${loggedUserPhone}.json`, {
                        method: 'PATCH',
                        body: JSON.stringify({ balance: nouveauSolde })
                    });

                    // 2. Création de la demande pour l'admin
                    const requestData = {
                        user: loggedUserPhone,
                        montant: amount,
                        montantNet: Math.floor(net),
                        reseau: network,
                        numeroReception: phone,
                        date: new Date().toLocaleString('fr-FR'),
                        statut: "En attente"
                    };

                    await fetch(`${DB_URL}/retraits.json`, {
                        method: 'POST',
                        body: JSON.stringify(requestData)
                    });

                    alert("Demande d'extraction réussie ! Vos fonds arriveront sur votre compte mobile après validation.");
                    window.location.href = "compte.html";
                } catch (e) { 
                    alert("Erreur de communication avec le serveur.");
                    location.reload();
                }
            }
        };

        window.onload = initWithdrawal;
    </script>
</body>
</html>
