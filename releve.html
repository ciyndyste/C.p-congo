<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congo Pétrole | Relevé de compte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --gold: #f59e0b; --oil-black: #020617; }
        body { background: var(--oil-black); font-family: 'Inter', sans-serif; color: white; }
        
        .tab-btn { color: #64748b; font-weight: 800; border-bottom: 3px solid transparent; transition: 0.2s; }
        .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
        
        .releve-card { 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(10px);
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            transition: 0.3s; 
        }

        .status-pending { color: #f59e0b; background: rgba(245, 158, 11, 0.1); }
        .status-success { color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .status-failed { color: #ef4444; background: rgba(239, 68, 68, 0.1); }

        .nav-bottom { 
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(15px); 
            border-top: 1px solid rgba(245, 158, 11, 0.2); 
        }
    </style>
</head>
<body class="pb-32">

    <div class="bg-slate-900/50 backdrop-blur-md p-5 flex items-center border-b border-white/5 sticky top-0 z-50">
        <a href="compte.html" class="text-amber-500 mr-4 active:scale-90 transition-transform">
            <i class="fa-solid fa-chevron-left text-xl"></i>
        </a>
        <h1 class="text-sm font-black uppercase tracking-widest text-white">Historique Transactions</h1>
    </div>

    <div class="bg-slate-900/80 flex justify-around border-b border-white/5 sticky top-[65px] z-40">
        <button onclick="filterRecords('all', this)" class="tab-btn active px-4 py-4 text-[10px] uppercase tracking-widest">Tout</button>
        <button onclick="filterRecords('recharge', this)" class="tab-btn px-4 py-4 text-[10px] uppercase tracking-widest">Recharges</button>
        <button onclick="filterRecords('retrait', this)" class="tab-btn px-4 py-4 text-[10px] uppercase tracking-widest">Retraits</button>
    </div>

    <div class="p-5">
        
        <div id="loadingOrEmptyMessage" class="text-center py-28 flex flex-col items-center">
            <div class="mb-5 relative">
                <i class="fa-solid fa-file-invoice-dollar text-6xl text-slate-800"></i>
                <div class="absolute inset-0 flex items-center justify-center">
                    <i class="fa-solid fa-sync fa-spin text-amber-500 text-lg"></i>
                </div>
            </div>
            <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">Synchronisation du grand livre...</p>
        </div>

        <div id="recordsContainer" class="hidden space-y-4">
            </div>

    </div>

    <nav class="fixed bottom-0 left-0 right-0 nav-bottom p-5 flex justify-around items-center z-50">
        <a href="dashboard.html" class="flex flex-col items-center text-slate-500"><i class="fa-solid fa-house text-xl"></i></a>
        <a href="produit.html" class="flex flex-col items-center text-slate-500"><i class="fa-solid fa-bag-shopping text-xl"></i></a>
        <a href="equipe.html" class="flex flex-col items-center text-slate-500"><i class="fa-solid fa-users text-xl"></i></a>
        <a href="compte.html" class="flex flex-col items-center text-amber-500"><i class="fa-solid fa-user text-xl"></i></a>
    </nav>

    <script>
        // Mise à jour vers ta base Congo Pétrole
        const DB_URL = "https://firstsolar-e2ba3-default-rtdb.firebaseio.com/congo_petrole";
        const loggedUserPhone = localStorage.getItem('userPhone');
        
        let allRecords = [];

        async function fetchAllHistory() {
            if (!loggedUserPhone) return window.location.href = "login.html";

            try {
                // Récupération des deux branches
                const [resRec, resRet] = await Promise.all([
                    fetch(`${DB_URL}/recharges_en_attente.json`),
                    fetch(`${DB_URL}/retraits_en_attente.json`)
                ]);

                const dataRec = await resRec.json();
                const dataRet = await resRet.json();

                allRecords = [];

                // Filtrage Recharges
                if (dataRec) {
                    Object.keys(dataRec).forEach(key => {
                        if (dataRec[key].userPhone === loggedUserPhone || dataRec[key].userAccount === loggedUserPhone) {
                            allRecords.push({ ...dataRec[key], type: 'recharge', id: key });
                        }
                    });
                }

                // Filtrage Retraits
                if (dataRet) {
                    Object.keys(dataRet).forEach(key => {
                        if (dataRet[key].user === loggedUserPhone || dataRet[key].userPhone === loggedUserPhone) {
                            allRecords.push({ ...dataRet[key], type: 'retrait', id: key });
                        }
                    });
                }

                // Tri par date (du plus récent au plus ancien)
                allRecords.sort((a, b) => {
                    const dateA = new Date(a.date || 0);
                    const dateB = new Date(b.date || 0);
                    return dateB - dateA;
                });

                renderUI(allRecords);

            } catch (e) {
                console.error(e);
                document.getElementById('loadingOrEmptyMessage').innerHTML = '<p class="text-red-500 font-black uppercase text-[10px]">Erreur de connexion aux serveurs de forage</p>';
            }
        }

        function renderUI(records) {
            const container = document.getElementById('recordsContainer');
            const msg = document.getElementById('loadingOrEmptyMessage');

            if (records.length === 0) {
                container.classList.add('hidden');
                msg.classList.remove('hidden');
                msg.innerHTML = `
                    <i class="fa-solid fa-box-open text-5xl text-slate-800 mb-4"></i>
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">Aucun mouvement détecté</p>
                `;
                return;
            }

            msg.classList.add('hidden');
            container.classList.remove('hidden');

            container.innerHTML = records.map(rec => {
                const isRecharge = rec.type === 'recharge';
                const status = rec.status || 'En attente';
                const statusClass = status === 'Validé' || status === 'Succès' ? 'status-success' : (status === 'Rejeté' || status === 'Échec' ? 'status-failed' : 'status-pending');
                
                // Icône Pétrole : Baril entrant ou sortant
                const icon = isRecharge ? 'fa-arrow-trend-up text-green-500' : 'fa-arrow-trend-down text-red-500';
                const amountPrefix = isRecharge ? '+' : '-';

                return `
                    <div class="releve-card p-5 flex items-center justify-between border-l-4 ${isRecharge ? 'border-l-green-500' : 'border-l-red-500'}">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-slate-900/50 flex items-center justify-center border border-white/5">
                                <i class="fa-solid ${icon} text-lg"></i>
                            </div>
                            <div>
                                <h3 class="text-[11px] font-black uppercase text-white tracking-wider">${isRecharge ? 'Flux Entrant' : 'Flux Sortant'}</h3>
                                <p class="text-[9px] font-bold text-slate-500 mt-1 uppercase italic">${rec.date || 'Date inconnue'}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black italic ${isRecharge ? 'text-green-500' : 'text-red-500'}">
                                ${amountPrefix} ${parseFloat(rec.amount).toLocaleString()} FC
                            </p>
                            <div class="mt-2">
                                <span class="${statusClass} text-[8px] font-black uppercase px-3 py-1 rounded-lg tracking-tighter">${status}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterRecords(type, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (type === 'all') {
                renderUI(allRecords);
            } else {
                const filtered = allRecords.filter(r => r.type === type);
                renderUI(filtered);
            }
        }

        window.onload = fetchAllHistory;
    </script>
</body>
</html>
