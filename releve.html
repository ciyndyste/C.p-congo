<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congo Pétrole | Relevé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --gold: #f59e0b; --oil-black: #020617; }
        body { background: var(--oil-black); font-family: 'Inter', sans-serif; color: white; }
        .tab-btn { color: #64748b; font-weight: 800; border-bottom: 3px solid transparent; transition: 0.2s; }
        .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
        .releve-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .status-pending { color: #f59e0b; background: rgba(245, 158, 11, 0.1); }
        .status-success { color: #10b981; background: rgba(16, 185, 129, 0.1); }
    </style>
</head>
<body class="pb-32">

    <div class="bg-slate-900/50 backdrop-blur-md p-5 flex items-center border-b border-white/5 sticky top-0 z-50">
        <a href="compte.html" class="text-amber-500 mr-4"><i class="fa-solid fa-chevron-left text-xl"></i></a>
        <h1 class="text-sm font-black uppercase tracking-widest text-white">Historique</h1>
    </div>

    <div class="bg-slate-900/80 flex justify-around border-b border-white/5 sticky top-[65px] z-40">
        <button onclick="filterRecords('all', this)" class="tab-btn active px-4 py-4 text-[10px] uppercase">Tout</button>
        <button onclick="filterRecords('recharge', this)" class="tab-btn px-4 py-4 text-[10px] uppercase">Recharges</button>
        <button onclick="filterRecords('retrait', this)" class="tab-btn px-4 py-4 text-[10px] uppercase">Retraits</button>
    </div>

    <div class="p-5">
        <div id="loadingOrEmptyMessage" class="text-center py-20">
            <i class="fa-solid fa-sync fa-spin text-amber-500 text-3xl mb-4"></i>
            <p class="text-[10px] font-bold text-slate-500 uppercase">Chargement du forage...</p>
        </div>
        <div id="recordsContainer" class="hidden space-y-4"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://firstsolar-e2ba3-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const loggedUserPhone = localStorage.getItem('userPhone');
        let allRecords = [];

        async function fetchHistory() {
            if (!loggedUserPhone) { window.location.href = "login.html"; return; }

            try {
                const snapRec = await get(ref(db, 'congo_petrole/recharges'));
                const snapRet = await get(ref(db, 'congo_petrole/retraits'));

                allRecords = [];

                if (snapRec.exists()) {
                    const data = snapRec.val();
                    Object.values(data).forEach(r => {
                        // On vérifie phone OU user pour être sûr
                        if (r.phone === loggedUserPhone || r.user === loggedUserPhone) {
                            allRecords.push({ ...r, type: 'recharge' });
                        }
                    });
                }

                if (snapRet.exists()) {
                    const data = snapRet.val();
                    Object.values(data).forEach(r => {
                        // CORRECTION ICI : Ton fichier retrait envoie 'user', pas 'phone'
                        if (r.user === loggedUserPhone || r.phone === loggedUserPhone) {
                            allRecords.push({ ...r, type: 'retrait' });
                        }
                    });
                }

                // Tri par date
                allRecords.sort((a, b) => new Date(b.date) - new Date(a.date));
                renderUI(allRecords);

            } catch (e) {
                console.error(e);
                document.getElementById('loadingOrEmptyMessage').innerHTML = "Erreur de connexion";
            }
        }

        window.renderUI = function(records) {
            const container = document.getElementById('recordsContainer');
            const msg = document.getElementById('loadingOrEmptyMessage');

            if (records.length === 0) {
                container.classList.add('hidden');
                msg.classList.remove('hidden');
                msg.innerHTML = `<p class="text-[10px] text-slate-500 uppercase">Aucune transaction trouvée</p>`;
                return;
            }

            msg.classList.add('hidden');
            container.classList.remove('hidden');

            container.innerHTML = records.map(rec => {
                const isRec = rec.type === 'recharge';
                const status = rec.statut || 'En attente';
                const sClass = (status === 'Validé' || status === 'Terminé' || status === 'Payé' || status === 'Succès') ? 'status-success' : 'status-pending';

                return `
                    <div class="releve-card p-5 flex items-center justify-between border-l-4 ${isRec ? 'border-l-green-500' : 'border-l-red-500'}">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid ${isRec ? 'fa-arrow-trend-up text-green-500' : 'fa-arrow-trend-down text-red-500'} text-lg"></i>
                            <div>
                                <h3 class="text-[10px] font-black uppercase">${isRec ? 'Recharge' : 'Extraction'}</h3>
                                <p class="text-[9px] text-slate-500 uppercase">${rec.date || 'Récemment'}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black ${isRec ? 'text-green-500' : 'text-red-500'}">
                                ${isRec ? '+' : '-'} ${Number(rec.montant).toLocaleString()} FC
                            </p>
                            <span class="${sClass} text-[8px] font-black uppercase px-2 py-1 rounded-md">${status}</span>
                        </div>
                    </div>
                `;
            }).join(''); 
        }

        window.filterRecords = function(type, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (type === 'all') renderUI(allRecords);
            else renderUI(allRecords.filter(r => r.type === type));
        }

        fetchHistory();
    </script>
</body>
</html>
